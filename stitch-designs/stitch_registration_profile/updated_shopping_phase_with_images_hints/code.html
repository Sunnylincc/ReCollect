<header class="fixed top-0 left-0 w-full flex items-center justify-between px-6 h-16 bg-[#f4faff]/80 backdrop-blur-xl z-50 shadow-sm">

<!-- Hint Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center px-6 pointer-events-none" id="hint-modal">
<div class="absolute inset-0 bg-[#0c1e26]/40 backdrop-blur-md transition-opacity"></div>

<ul class="space-y-4 w-full text-center">
<li class="text-2xl font-headline font-bold text-on-surface flex items-center justify-center gap-3">

                </li>
<li class="text-2xl font-headline font-bold text-on-surface">Apples</li>
<li class="text-2xl font-headline font-bold text-on-surface">Bread</li>
<li class="text-2xl font-headline font-bold text-on-surface">Bananas</li>

<button class="mt-10 btn-gradient w-full py-4 rounded-full text-on-primary font-bold text-xl active:scale-95 transition-all" onclick="toggleHint()">

<!-- Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pointer-events-none">
<div class="max-w-md mx-auto pointer-events-auto">
<button class="w-full btn-gradient text-on-primary h-[72px] rounded-[2rem] font-headline font-bold text-xl shadow-lg hover:shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
