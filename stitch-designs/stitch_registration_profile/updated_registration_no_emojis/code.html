<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#def0fc",
              "primary-container": "#0a46c4",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "primary": "#003194",
              "secondary-fixed-dim": "#dfb7ff",
              "primary-fixed": "#dce1ff",
              "outline-variant": "#c4c5d6",
              "surface-container-low": "#e8f6ff",
              "primary-fixed-dim": "#b5c4ff",
              "surface-container-high": "#d9ebf7",
              "on-tertiary-fixed": "#001d35",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#2d0050",
              "on-secondary-fixed-variant": "#661aa3",
              "surface-bright": "#f4faff",
              "inverse-primary": "#b5c4ff",
              "outline": "#747685",
              "on-secondary-container": "#4e0084",
              "on-primary-fixed-variant": "#003bae",
              "surface": "#f4faff",
              "surface-tint": "#2454d1",
              "error-container": "#ffdad6",
              "surface-dim": "#cbdde8",
              "on-error": "#ffffff",
              "on-surface": "#0c1e26",
              "surface-variant": "#d3e5f1",
              "secondary-fixed": "#f1dbff",
              "secondary": "#803abd",
              "inverse-surface": "#22333c",
              "on-background": "#0c1e26",
              "tertiary-fixed": "#d0e4ff",
              "secondary-container": "#c17bff",
              "inverse-on-surface": "#e2f3ff",
              "on-secondary": "#ffffff",
              "on-primary-container": "#b4c3ff",
              "surface-container-highest": "#d3e5f1",
              "tertiary-fixed-dim": "#adc9eb",
              "tertiary": "#213d59",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#00164e",
              "on-tertiary-fixed-variant": "#2d4965",
              "tertiary-container": "#395471",
              "on-tertiary-container": "#acc8ea",
              "error": "#ba1a1a",
              "on-surface-variant": "#434654",
              "background": "#f4faff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-cta-gradient {
            background: linear-gradient(135deg, #003194 0%, #0a46c4 100%);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen selection:bg-primary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full flex items-center justify-between px-6 h-16 bg-[#f4faff]/80 backdrop-blur-xl z-50 shadow-sm">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#d3e5f1]/50 transition-colors active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-[#003194]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-xl tracking-tight text-[#003194]">Join Remind</h1>
</div>
<button class="p-2 rounded-full hover:bg-[#d3e5f1]/50 transition-colors active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-[#0c1e26]/60" data-icon="help">help</span>
</button>
</header>
<!-- Content Canvas -->
<main class="pt-24 pb-12 px-6 max-w-xl mx-auto min-h-screen flex flex-col justify-center">
<!-- Hero Section -->
<div class="mb-12 space-y-4">
<h2 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight leading-tight">
                Let's get to <br/><span class="text-primary">know you</span> better.
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed">
                This helps us personalize your cognitive exercises and daily reminders for a safer, more mindful experience.
            </p>
</div>
<!-- Registration Form -->
<form class="space-y-10">
<!-- Name Input -->
<div class="group">
<label class="block font-label font-semibold text-sm text-on-surface-variant mb-3 px-1" for="name">
                    What is your full name?
                </label>
<div class="relative">
<input class="w-full bg-surface-variant border-none rounded-full py-5 px-8 text-xl text-on-surface placeholder:text-on-surface/30 focus:ring-4 focus:ring-primary/10 transition-all outline-none" id="name" name="name" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Age Input -->
<div class="group">
<label class="block font-label font-semibold text-sm text-on-surface-variant mb-3 px-1" for="age">
                    How many years young are you?
                </label>
<div class="relative max-w-[200px]">
<input class="w-full bg-surface-variant border-none rounded-full py-5 px-8 text-xl text-on-surface placeholder:text-on-surface/30 focus:ring-4 focus:ring-primary/10 transition-all outline-none" id="age" name="age" placeholder="Age" type="number"/>
</div>
</div>
<!-- Conditions Textarea -->
<div class="group">
<label class="block font-label font-semibold text-sm text-on-surface-variant mb-3 px-1" for="conditions">
                    Any prior health conditions we should know?
                </label>
<div class="relative">
<textarea class="w-full bg-surface-variant border-none rounded-3xl py-5 px-8 text-lg text-on-surface placeholder:text-on-surface/30 focus:ring-4 focus:ring-primary/10 transition-all outline-none resize-none" id="conditions" name="conditions" placeholder="e.g. Hypertension, Diabetes, etc." rows="4"></textarea>
</div>
</div>
<!-- CTA Section -->
<div class="pt-8 flex flex-col items-center">
<button class="w-full h-16 bg-cta-gradient text-on-primary font-headline font-bold text-xl rounded-full shadow-lg shadow-primary/20 flex items-center justify-center gap-3 active:scale-[0.98] transition-all hover:brightness-110" type="submit">
                    Start My Journey
                    <span class="material-symbols-outlined text-2xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-6 text-on-surface-variant text-sm font-medium">
                    Your data is encrypted and stored securely.
                </p>
</div>
</form>
<!-- Decorative Element (Asymmetric Tonal Layering) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-surface-container-high rounded-full blur-[80px] -z-10 opacity-60"></div>
<div class="fixed top-1/2 -right-32 w-80 h-80 bg-secondary-fixed-dim rounded-full blur-[100px] -z-10 opacity-30"></div>
</main>
<!-- No BottomNavBar for this transactional screen as per instructions -->
</body></html>
